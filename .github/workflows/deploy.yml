name: Deploy site (S3 + CloudFront)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissões mínimas: id-token para OIDC, contents para checkout
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::202077713431:role/canys-github-deploy
  S3_BUCKET: canys-site-b44af36c
  CLOUDFRONT_DISTRIBUTION_ID: EM5PUFX8CLXNE

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload assets (cache longo, imutável)
        run: |
          aws s3 sync dist/ "s3://$S3_BUCKET" \
            --delete \
            --cache-control "public,max-age=31536000,immutable"

      - name: Reescrever HTML (sem cache)
        run: |
          aws s3 cp dist/ "s3://$S3_BUCKET" \
            --recursive \
            --exclude "*" --include "*.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "public,max-age=0,must-revalidate" \
            --metadata-directive REPLACE

      - name: Invalidar cache do CloudFront
        if: env.CLOUDFRONT_DISTRIBUTION_ID != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths "/*"
